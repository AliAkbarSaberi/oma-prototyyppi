<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategoriat</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #fce0d1;
            color: #191919;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #69013b;
            color: #ffffff;
            padding: 1rem;
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }
        nav {
            background-color: #ffffff;
            padding: 0.5rem;
            text-align: center;
        }
        nav a {
            margin: 0 1rem;
            color: #69013b;
            text-decoration: none;
            font-weight: bold;
        }
        .content {
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .filters {
            margin-bottom: 1rem;
        }
        .filters button {
            background-color: #ffffff;
            border: 1px solid #69013b;
            color: #69013b;
            padding: 0.5rem;
            margin: 0.25rem;
            cursor: pointer;
        }
        .filters button.active {
            background-color: #69013b;
            color: #ffffff;
        }
        .item {
            background-color: #ffffff;
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 5px;
            display: flex;
            align-items: center;
        }
        .item img {
            width: 80px;
            height: 80px;
            margin-right: 1rem;
            background-color: #fce0d1;
            border: 2px solid #69013b;
            border-radius: 10px;
            box-sizing: border-box;
            flex: 0 0 auto;
        }
        .item h3 {
            font-family: 'Playfair Display', serif;
            margin: 0;
        }
        .item p {
            margin: 0.5rem 0;
        }
        .language-switch {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .language-switch button {
            background: none;
            border: 1px solid #69013b;
            color: #69013b;
            padding: 0.5rem;
            margin: 0 0.25rem;
            cursor: pointer;
        }
        .language-switch button.active {
            background-color: #69013b;
            color: #ffffff;
        }
        @media (min-width: 768px) {
            .content {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-switch">
        <button class="active" onclick="setLanguage('fi')">FI</button>
        <button onclick="setLanguage('en')">EN</button>
    </div>
    <header>
        <h1 id="title">Kategoriat</h1>
    </header>
    <nav>
        <a href="index.html">Etusivu</a>
        <a href="categories.html">Kategoriat</a>
        <a href="networking.html">Mitä verkostoituminen tarkoittaa</a>
    </nav>
    <div class="content">
        <div class="filters">
            <button class="active" onclick="filter('all')" id="all-btn">Kaikki</button>
            <button onclick="filter('yhteiso')">Yhteisöt</button>
            <button onclick="filter('tapahtuma')">Tapahtumat</button>
        </div>
        <div id="items">
            <div class="item yhteiso">
                <img src="yhteiso.png" alt="Yhteisö">
                <div>
                    <h3>Yhteisö A</h3>
                    <p>Kohderyhmä: Nuoret aikuiset</p>
                    <p>Sijainti: Helsinki</p>
                    <a href="organization.html">Lue lisää</a>
                </div>
            </div>
            <div class="item tapahtuma">
                <img src="tapahtuma.png" alt="Tapahtuma">
                <div>
                    <h3>Tapahtuma B</h3>
                    <p>Kohderyhmä: Yritykset</p>
                    <p>Aika ja paikka: 15.5.2026, Helsinki</p>
                    <a href="event.html">Lue lisää</a>
                </div>
            </div>
            <!-- More items -->
        </div>
    </div>
    <script>
        const content = {
            fi: {
                title: "Kategoriat",
                all: "Kaikki",
                yhteiso: "Yhteisöt",
                tapahtuma: "Tapahtumat"
            },
            en: {
                title: "Categories",
                all: "All",
                yhteiso: "Communities",
                tapahtuma: "Events"
            }
        };

        function setLanguage(lang) {
            document.getElementById('title').textContent = content[lang].title;
            document.getElementById('all-btn').textContent = content[lang].all;
            // Update other buttons similarly
            document.querySelectorAll('.language-switch button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function filter(type) {
            const items = document.querySelectorAll('.item');
            items.forEach(item => {
                if (type === 'all' || item.classList.contains(type)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
