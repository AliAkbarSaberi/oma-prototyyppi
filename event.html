<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapahtuma</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #fce0d1;
            color: #191919;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #69013b;
            color: #ffffff;
            padding: 1rem;
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }
        nav {
            background-color: #ffffff;
            padding: 0.5rem;
            text-align: center;
        }
        nav a {
            margin: 0 1rem;
            color: #69013b;
            text-decoration: none;
            font-weight: bold;
        }
        .content {
            padding: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .media {
            text-align: center;
            margin-bottom: 1rem;
        }
        .media img, .media video {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 4px solid #69013b;
            border-radius: 12px;
            box-sizing: border-box;
            background: #fce0d1;
            box-shadow: 0 8px 20px rgba(25, 25, 25, 0.12);
        }
        .details {
            background-color: #ffffff;
            padding: 1rem;
            border-radius: 5px;
        }
        .cta {
            background-color: #69013b;
            color: #ffffff;
            padding: 1rem;
            text-align: center;
            margin: 1rem 0;
            border-radius: 5px;
        }
        .cta a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }
        .language-switch {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .language-switch button {
            background: none;
            border: 1px solid #69013b;
            color: #69013b;
            padding: 0.5rem;
            margin: 0 0.25rem;
            cursor: pointer;
        }
        .language-switch button.active {
            background-color: #69013b;
            color: #ffffff;
        }
        @media (min-width: 768px) {
            .content {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="language-switch">
        <button class="active" onclick="setLanguage('fi')">FI</button>
        <button onclick="setLanguage('en')">EN</button>
    </div>
    <header>
        <h1 id="title">Tapahtuma B</h1>
    </header>
    <nav>
        <a href="index.html">Etusivu</a>
        <a href="categories.html">Kategoriat</a>
        <a href="networking.html">Mitä verkostoituminen tarkoittaa</a>
    </nav>
    <div class="content">
        <div class="media">
            <img src="placeholder_event.png" alt="Tapahtuma kuva">
        </div>
        <div class="details">
            <p><strong id="datetime-label">Aika ja paikka:</strong> 15.5.2026, Helsinki</p>
            <p><strong id="audience-label">Kohderyhmä:</strong> Yritykset</p>
            <p id="description">Tämä tapahtuma tarjoaa mahdollisuuden verkostoitumiseen ja uusien kontaktien luomiseen yritysmaailmassa.</p>
        </div>
        <div class="cta">
            <a href="#" id="organizer-link">Organisaattorin sivu</a>
        </div>
    </div>
    <script>
        const content = {
            fi: {
                title: "Tapahtuma B",
                datetime: "Aika ja paikka:",
                audience: "Kohderyhmä:",
                desc: "Tämä tapahtuma tarjoaa mahdollisuuden verkostoitumiseen ja uusien kontaktien luomiseen yritysmaailmassa.",
                organizer: "Organisaattorin sivu"
            },
            en: {
                title: "Event B",
                datetime: "Date and location:",
                audience: "Target audience:",
                desc: "This event offers opportunities for networking and creating new contacts in the business world.",
                organizer: "Organizer's page"
            }
        };

        function setLanguage(lang) {
            document.getElementById('title').textContent = content[lang].title;
            document.getElementById('datetime-label').textContent = content[lang].datetime;
            document.getElementById('audience-label').textContent = content[lang].audience;
            document.getElementById('description').textContent = content[lang].desc;
            document.getElementById('organizer-link').textContent = content[lang].organizer;
            document.querySelectorAll('.language-switch button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
